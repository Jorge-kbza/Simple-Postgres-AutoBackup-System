version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: backup-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: postgres_backup
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backups:/backups
    depends_on:
      - postgres

volumes:
  postgres_data: